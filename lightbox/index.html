<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/vns-gallery.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .my-gallery img {
            width: 100%;
        }
        .vns-gallery-container {
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="my-gallery">

        <!-- 이미지 2 -->
        <img src="https://i.pinimg.com/736x/6a/6f/36/6a6f36e4c6e401440cec29c2f275fffb.jpg" 
             data-fullsize="https://i.pinimg.com/736x/6a/6f/36/6a6f36e4c6e401440cec29c2f275fffb.jpg" 
             alt="배경화면 2">
        <!-- 이미지 3 -->
        <img src="https://i.pinimg.com/736x/66/48/db/6648db5e37fea8f0de3d95d6b77de539.jpg"

             alt="배경화면 3">
        <!-- 이미지 4 -->
        <img src="https://i.pinimg.com/736x/b2/60/ab/b260abf13834ad3d9cb429c2d6573251.jpg" 
             data-fullsize="https://i.pinimg.com/736x/b2/60/ab/b260abf13834ad3d9cb429c2d6573251.jpg" 
             alt="배경화면 4">
        <!-- 이미지 5 -->
        <img src="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             data-fullsize="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             alt="배경화면 5">
        <!-- 이미지 6 -->
        <img src="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             data-fullsize="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             alt="배경화면 6">
        <!-- 이미지 7 -->
        <img src="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg"

        <!-- 이미지 8 -->
        <img src="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             data-fullsize="https://i.pinimg.com/736x/88/a2/7e/88a27e75902c3b3676ff7d58c6d416d9.jpg" 
             alt="배경화면 8">
    </div>
    <script src="../js/libs/jquery.min.js"></script>
    <script src="assets/js/vns-gallery.min.js"></script>
    <script>
        $(document).ready(function() {
            /**
             * VNS.Gallery 플러그인 설정
             * 
             * [주석 설명]
             * 
             * // 캐러셀 사용 여부 (true: 슬라이드 형태, false: 정적 그리드)
             * useCarousel: true,
             * 
             * // 반복 여부 (true: 마지막 이미지에서 첫 이미지로 이동)
             * loop: true,
             * 
             * // 컬럼 수 (4개 컬럼으로 표시)
             * columns: 4,
             * 
             * // 모달 그리드 컬럼 수
             * modalColumns: 4,
             * 
             * // 이전/다음 화살표 표시
             * showNavigation: true,
             * 
             * // 이미지 카운터 표시 (예: 1/8)
             * showCounter: true,
             * 
             * // 키보드 네비게이션 활성화 (좌우 화살표로 이미지 전환)
             * enableKeyboard: true,
             * 
             * // 드래그 활성화 (마우스/터치로 이미지 전환)
             * enableDrag: true,
             * 
             * // 캡션 표시 (alt 속성 사용)
             * captions: true,
             * 
             * // 캡션 위치
             * captionPosition: 'bottom-center',
             * 
             * // 캡션 데이터 소스
             * captionsData: 'alt'
             */
            $('.my-gallery').vnsGallery({
                // 캐러셀 사용 (슬라이드 형태)
                useCarousel: true,
                
                // 반복 여부
                loop: true,
                
                // 컬럼 수 (4개 컬럼)
                columns: 4,
                
                // 모달 컬럼 수
                modalColumns: 4,
                
                // 네비게이션 화살표 표시
                showNavigation: true,
                
                // 이미지 카운터 표시
                showCounter: true,
                
                // 키보드 네비게이션
                enableKeyboard: true,
                
                // 드래그 활성화
                enableDrag: true,
                
                // 캡션 표시
                captions: true,
                
                // 캡션 위치
                captionPosition: 'bottom-center',
                
                // 캡션 데이터 (alt 속성)
                captionsData: 'alt'
            });
        });
    </script>
</body>
</html>
