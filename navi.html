<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        li {
            list-style: none;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        .manu {
            font-size: 3rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            padding: 20px 10px;
        }
        .navi {
            display: flex;
            gap: 30px;
        }
        .mo-menu {
            display: none;
        }
        @media(max-width:560px) {
            .navi {
                width: 100%;
                height: 100%;
                /* display: none; */
                flex-direction: column;
                text-align: center;
                position: absolute;
                background-color: aquamarine;
                left: -100%;
                /* top: -100%; */
                transition: all 0.5s;
            }
            .header {
                background-color: aquamarine;
            }
            .mo-menu {
                display: block;
            }
            .on-navi {
                top: 93px;
                left: 0%;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="logo">
            <h1>LOGO</h1>
        </div>
        <ul class="navi">
            <li><a href="#">HOME</a></li>
            <li><a href="#">ABOUT</a></li>
            <li><a href="#">COMPANY</a></li>
            <li><a href="#">SERVICE</a></li>
            <li><a href="#">CONTENT US</a></li>
        </ul>
        <div class="mo-menu">
            <span class="material-symbols-outlined menu">
                menu
            </span>
        </div>
    </header>
    <script src="js/libs/jquery.min.js"></script>
    <script>
        $(".mo-menu").click(function() {
            $(".navi").toggleClass("on-navi");
            // $(".navi").css("top", "93px");
        })
    </script>
</body>

</html>
