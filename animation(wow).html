<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box {
            width: 100%;
            height: 100px;
            margin: 20px 0;
        }
        .box:nth-child(1) { background-color: #FF6B6B; }
        .box:nth-child(2) { background-color: #FF9F43; }
        .box:nth-child(3) { background-color: #FFD93D; }
        .box:nth-child(4) { background-color: #6BCB77; }
        .box:nth-child(5) { background-color: #4D96FF; }
        .box:nth-child(6) { background-color: #9D4EDD; }
        .box:nth-child(7) { background-color: #F72585; }
        .box:nth-child(8) { background-color: #3A86FF; }
        .box:nth-child(9) { background-color: #00B894; }
        .box:nth-child(10) { background-color: #E17055; }
        .box:nth-child(11) { background-color: #FD79A8; }
        .box:nth-child(12) { background-color: #00CEC9; }
        .box:nth-child(13) { background-color: #0984E3; }
        .box:nth-child(14) { background-color: #6C5CE7; }
        .box:nth-child(15) { background-color: #FAB1A0; }
        .box:nth-child(16) { background-color: #81ECEC; }
        .box:nth-child(17) { background-color: #55EFC4; }
        .box:nth-child(18) { background-color: #FFEAA7; }
        .box:nth-child(19) { background-color: #74B9FF; }
        .box:nth-child(20) { background-color: #A29BFE; }
    </style>

    <link rel="stylesheet" href="https://wowjs.uk/css/libs/animate.css">
</head>
<body>
    <div class="box wow rollIn" data-wow-duration="2s" data-wow-delay="2s"></div>
    <div class="box wow bounceInRight center" data-wow-duration="2s" data-wow-iteration="10"></div>
    <div class="box wow bounceInRight"></div>
    <div class="box wow swing center" data-wow-iteration="10"></div>
    <div class="box wow lightSpeedIn" data-wow-duration="2s" data-wow-delay="5s"></div>
    <div class="box wow lightSpeedIn center" data-wow-duration="2s" data-wow-iteration="10"></div>
    <div class="box wow bounceInRight" data-wow-duration="2s" data-wow-iteration="10"></div>
    <div class="box wow bounceInRight center" data-wow-duration="1s" data-wow-iteration="5"></div>
    <div class="box wow bounceInRight" data-wow-delay="5s"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>

    <script src="https://wowjs.uk/dist/wow.min.js"></script>
    <script>
        new WOW().init();
    </script>
</body>
</html>
