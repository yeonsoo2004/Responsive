<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Observer 도미노 텍스트</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #111;
        }

        .panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel h2 {
            font-family: 'Pretendard', sans-serif;
            font-size: 5rem;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 20px rgba(0, 0, 0, .3);
            margin: 0;
            overflow: hidden; /* 글자가 밑에서 올라올 때 깔끔하게 잘리도록 설정 (선택사항) */
        }

        /* 💡 핵심 CSS: 쪼개진 글자들이 위아래로 움직이려면 반드시 inline-block이어야 합니다! */
        .char {
            display: inline-block; 
        }

        .panel1 { background-image: url('assets/images/img-1.avif'); }
        .panel2 { background-image: url('assets/images/img-2.avif'); }
        .panel3 { background-image: url('assets/images/img-3.avif'); }
        .panel4 { background-image: url('assets/images/img-4.avif'); }
        .panel5 { background-image: url('assets/images/img-5.avif'); }
        .panel6 { background-image: url('assets/images/img-6.avif'); }
    </style>
</head>
<body>

    <div class="panel panel1"><h2>INNOVATION</h2></div>
    <div class="panel panel2"><h2>REDEFINED</h2></div>
    <div class="panel panel3"><h2>PUSHING</h2></div>
    <div class="panel panel4"><h2>BOUNDARIES</h2></div>
    <div class="panel panel5"><h2>SHAPING</h2></div>
    <div class="panel panel6"><h2>TOMORROW</h2></div>

    <script src="../js/libs/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/Observer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <!-- ScrollSmoother requires ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollSmoother.min.js"></script>

    <script>
        gsap.registerPlugin(Observer);

        const sections = document.querySelectorAll(".panel");
        let currentIndex = 0;
        let isAnimating = false;

        // ==========================================
        // 1. 텍스트를 한 글자씩 쪼개는 마법의 스크립트
        // ==========================================
        sections.forEach(section => {
            const h2 = section.querySelector("h2");
            const text = h2.innerText; // "도미노처럼" 글자 가져오기
            h2.innerHTML = "";         // 기존 글자 싹 비우기
            
            // 글자를 하나씩 쪼개서 span 태그로 감싸서 다시 넣기
            text.split("").forEach(char => {
                if (char === " ") {
                    h2.innerHTML += "&nbsp;"; // 띄어쓰기 유지
                } else {
                    h2.innerHTML += `<span class="char">${char}</span>`;
                }
            });
        });

        // ==========================================
        // 2. GSAP 초기 셋팅
        // ==========================================
        gsap.set(sections, { yPercent: 100 }); 
        gsap.set(sections[0], { yPercent: 0 });
        
        // h2 전체가 아니라 쪼개진 글자(.char)들을 숨깁니다.
        gsap.set(".char", { y: 50, opacity: 0 }); 
        gsap.set(sections[0].querySelectorAll(".char"), { y: 0, opacity: 1 });

        // ==========================================
        // 3. 화면 전환 애니메이션
        // ==========================================
        function gotoSection(index, direction) {
            if (isAnimating) return; 
            isAnimating = true;

            const currentSection = sections[currentIndex]; 
            const nextSection = sections[index];           
            
            // 현재 화면과 다음 화면의 쪼개진 글자들을 모두 선택합니다.
            const currentChars = currentSection.querySelectorAll(".char");
            const nextChars = nextSection.querySelectorAll(".char");

            // [화면 애니메이션]
            gsap.to(currentSection, { yPercent: -100 * direction, duration: 1.2, ease: "power3.inOut" });
            gsap.fromTo(nextSection, { yPercent: 100 * direction }, { yPercent: 0, duration: 1.2, ease: "power3.inOut", onComplete: () => isAnimating = false });

            // [기존 글자 퇴장 애니메이션] - 나갈 때도 타다닥!
            gsap.to(currentChars, {
                y: -50 * direction,
                opacity: 0,
                duration: 0.4,
                stagger: 0.02, // 0.02초 간격으로 순서대로 출발!
                ease: "power3.in"
            });

            // [새 글자 등장 애니메이션] - 들어올 때 도미노처럼 좌르르!
            gsap.fromTo(nextChars, 
                { y: 50 * direction, opacity: 0 }, 
                { 
                    y: 0,
                    opacity: 1,
                    duration: 0.8, 
                    delay: 0.6,      // 화면이 어느 정도 넘어오고 나서 시작
                    stagger: 0.05,   // 💡 핵심: 0.05초 간격으로 글자가 하나씩 짠! 나타남
                    ease: "back.out(1.7)" // 살짝 위로 튕겼다가 제자리로 오는 쫀득한 효과
                }
            );

            currentIndex = index;
        }

        Observer.create({
            target: window,
            type: "wheel,touch,pointer", 
            wheelSpeed: -1,
            onUp: () => { if (currentIndex < sections.length - 1) gotoSection(currentIndex + 1, 1); },
            onDown: () => { if (currentIndex > 0) gotoSection(currentIndex - 1, -1); },
            tolerance: 10,       
            preventDefault: true 
        });
    </script>
</body>
</html>
