<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            box-sizing: border-box;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        .container {
            width: 1440px;
            margin: auto;
        }

        .tab-title>ul {
            display: flex;
        }

        .tab-title li {
            width: 33%;
            text-align: center;
            padding: 20px 0;
        }

        .line-active {
            border-bottom: 1px solid skyblue;
            background-color: aquamarine;
        }

        .tab-body {
            width: 100%;
            text-align: center;
            background-color: aquamarine;
            height: 300px;
        }

        .tab-body-2,.tab-body-3 {
            display: none;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="tab-title">
            <ul>
                <li class="tab-title-1 line-active"><a href="#">TAB-1</a></li>
                <li class="tab-title-2"><a href="#">TAB-2</a></li>
                <li class="tab-title-3"><a href="#">TAB-3</a></li>
            </ul>
        </div>
        <div class="tab-body">
            <div class="tab-body-1">
                <h2>body1</h2>
            </div>
            <div class="tab-body-2">
                <h2>body2</h2>
            </div>
            <div class="tab-body-3">
                <h2>body3</h2>
            </div>
        </div>

    </div>
    <script src="../js/libs/jquery.min.js"></script>
    <script>
        $(function () {
            // $(".tab-title-2").click(function() {
            //     $(".tab-body-2").css("display","block");
            //     $(".tab-body-1").css("display","none");
            // })
            // $(".tab-title-1").click(function() {
            //     $(".tab-body-1").css("display","block");
            //     $(".tab-body-2").css("display","none");
            // })

            $(".tab-title li").click(function() {
                // 요소 번호 부여
                let index = $(this).index();
                // li요소 클릭하면 일단 먼저 속성을 끔
                $(".line-active").removeClass("line-active");
                // 끔과 동시에 나는 다시 클릭한 요소에 클래스 추가
                $(this).addClass("line-active");

                $(".tab-body > div").hide();
                $(".tab-body > div").eq(index).show();
            })
        })
    </script>
</body>

</html>
