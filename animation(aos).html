<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            /* AOS 애니메이션 시 가로 스크롤바가 생기는 현상 방지 */
            overflow-x: hidden; 
        }
        .box {
            width: 100%;
            height: 100px;
            margin: 20px 0;
        }
        .box:nth-child(1) { background-color: #FF6B6B; }
        .box:nth-child(2) { background-color: #FF9F43; }
        .box:nth-child(3) { background-color: #FFD93D; }
        .box:nth-child(4) { background-color: #6BCB77; }
        .box:nth-child(5) { background-color: #4D96FF; }
        .box:nth-child(6) { background-color: #9D4EDD; }
        .box:nth-child(7) { background-color: #F72585; }
        .box:nth-child(8) { background-color: #3A86FF; }
        .box:nth-child(9) { background-color: #00B894; }
        .box:nth-child(10) { background-color: #E17055; }
        .box:nth-child(11) { background-color: #FD79A8; }
        .box:nth-child(12) { background-color: #00CEC9; }
        .box:nth-child(13) { background-color: #0984E3; }
        .box:nth-child(14) { background-color: #6C5CE7; }
        .box:nth-child(15) { background-color: #FAB1A0; }
        .box:nth-child(16) { background-color: #81ECEC; }
        .box:nth-child(17) { background-color: #55EFC4; }
        .box:nth-child(18) { background-color: #FFEAA7; }
        .box:nth-child(19) { background-color: #74B9FF; }
        .box:nth-child(20) { background-color: #A29BFE; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
</head>
<body>
    <div class="box" data-aos="fade-down" data-aos-easing="linear" data-aos-duration="1500"></div>
    <div class="box" data-aos="fade-up"></div>
    <div class="box" data-aos="fade-right"></div>
    <div class="box" data-aos="fade-left"></div>
    <div class="box" data-aos="fade-up-right"></div>
    <div class="box" data-aos="fade-up-left"></div>
    <div class="box" data-aos="flip-left"></div>
    <div class="box" data-aos="flip-right"></div>
    <div class="box" data-aos="flip-up"></div>
    <div class="box" data-aos="flip-down"></div>
    <div class="box" data-aos="zoom-in"></div>
    <div class="box" data-aos="zoom-in-up"></div>
    <div class="box" data-aos="zoom-in-down"></div>
    <div class="box" data-aos="zoom-out"></div>
    <div class="box" data-aos="slide-up"></div>
    <div class="box" data-aos="slide-down"></div>
    <div class="box" data-aos="slide-left"></div>
    <div class="box" data-aos="slide-right"></div>
    <div class="box" data-aos="fade-up" data-aos-duration="3000"></div>
    <div class="box" data-aos="fade-up" data-aos-delay="500"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>
</html>
